project:
  type: website
  output-dir: _site
  resources:
    - CNAME
    - robots.txt
    - instantpage.js

website:
  title: "Andreas Bogossian"
  description: "Notes on challenging technical things"
  site-url: "https://andreasbogossian.com"
  favicon: bell-curve.svg
  search: true
  open-graph:
    image: og-image.webp
  page-footer:
    border: true
    background: "dark"
    foreground: "light"
    left: "© 2026 Andreas Bogossian"
    center: "Built with [Quarto](https://quarto.org) · [Source](https://github.com/AJBogo9/tech-blog)"
    right:
      - icon: linkedin
        href: https://www.linkedin.com/in/andreas-bogossian/
        aria-label: LinkedIn
      - icon: github
        href: https://github.com/AJBogo9
        aria-label: GitHub
  navbar:
    left:
      - text: "Blog"
        href: blog.qmd
      - text: "Publications"
        href: publications.qmd
      - text: "Projects"
        href: projects.qmd
      - text: "CV"
        href: cv.qmd
    right:
      - icon: linkedin
        href: https://www.linkedin.com/in/andreas-bogossian/
        aria-label: LinkedIn
      - icon: github
        href: https://github.com/AJBogo9
        aria-label: GitHub

jupyter: python3

format:
  html:
    theme: darkly
    css: custom.css
    highlight-style: github-dark
    code-fold: false
    code-tools: false
    toc: true
    toc-depth: 3
    toc-title: "Contents"
    number-sections: false
    smooth-scroll: true
    link-external-icon: true
    link-external-newwindow: true
    fig-responsive: true
    fig-lazy-loading: true
    lightbox: true
    include-in-header:
      text: |
        <link rel="preconnect" href="https://cdn.jsdelivr.net">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    include-after-body:
      text: |
        <script src="/instantpage.js" type="module"></script>

execute:
  freeze: auto
  echo: true
  warning: false