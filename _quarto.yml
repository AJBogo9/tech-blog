project:
  type: website
  output-dir: _site
  resources:
    - CNAME

website:
  title: "Andreas Bogossian"
  description: "Notes on challenging technical things"
  site-url: "https://andreasbogossian.com"
  search: true
  open-graph: true
  page-footer:
    border: true
    background: "dark"
    foreground: "light"
    left: "© 2026 Andreas Bogossian"
    center: "Built with [Quarto](https://quarto.org)"
    right:
      - icon: linkedin
        href: https://www.linkedin.com/in/bogo9/
        aria-label: LinkedIn
      - icon: github
        href: https://github.com/AJBogo9
        aria-label: GitHub
  navbar:
    left:
      - text: "About"
        href: about.qmd
    right:
      - icon: linkedin
        href: https://www.linkedin.com/in/bogo9/
        aria-label: LinkedIn
      - icon: github
        href: https://github.com/AJBogo9
        aria-label: GitHub

jupyter: python3

format:
  html:
    theme: darkly
    highlight-style: github-dark
    code-fold: false
    code-tools: false
    toc: true
    toc-depth: 3
    toc-title: "Contents"
    number-sections: false
    smooth-scroll: true
    link-external-icon: true
    link-external-newwindow: true
    fig-responsive: true
    html-math-method: katex

execute:
  freeze: auto
  echo: true
  warning: false