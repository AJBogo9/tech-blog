project:
  type: website
  output-dir: _site

website:
  title: "Tech Blog"
  description: "Notes on challenging technical things"
  search: true
  open-graph: true
  navbar:
    # left:
    #   - text: "Posts"
    #     href: posts/index.qmd
    #   - text: "Tags"
    #     href: tags/index.qmd
    #   - text: "About"
    #     href: about.qmd
    right:
      - icon: linkedin
        href: https://www.linkedin.com/in/bogo9/
        aria-label: LinkedIn
      - icon: github
        href: https://github.com/AJBogo9
        aria-label: GitHub
      - icon: sun
        id: quarto-color-scheme-toggle  
        aria-label: Toggle dark mode

format:
  html:
    theme:
      light: flatly
      dark: darkly
    highlight-style: github
    code-fold: false
    code-tools: false
    toc: true
    toc-depth: 3
    toc-title: "Contents"
    number-sections: false
    smooth-scroll: true
    link-external-icon: true
    link-external-newwindow: true
    fig-responsive: true
    html-math-method: katex

execute:
  freeze: auto
  echo: true
  warning: false